name: Publish Release

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: publish-release
    # Only run in non-fork repos, on protected default branches.
    if: |
      (! github.event.repository.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected
    permissions:
      contents: read # Required to clone the repository when this template is used in a private repo.
      id-token: write # Required for npm trusted publishing via GitHub OIDC.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Pack and verify tarballs
        run: pnpm run release:pack-packages

      - name: Stage packages to npm
        id: stage-release
        run: bash ./scripts/release/stage-packages-to-npm.sh

      - name: Summarize staged releases
        env:
          STAGE_IDS: ${{ steps.stage-release.outputs.stage_ids }}
        run: bash ./scripts/release/summarize-staged-releases.sh
